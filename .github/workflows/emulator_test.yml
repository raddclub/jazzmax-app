name: Test JazzMAX on Android Emulator

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'APK build run number to test (leave blank for latest)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build JazzMAX APK"]
    types: [completed]

jobs:
  emulator-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Download the APK ──────────────────────────────────────────────────
      - name: Download latest APK artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_apk.yml
          workflow_conclusion: success
          name_is_regexp: true
          name: jazzmax-debug-.*
          path: apk/
          search_artifacts: true
          skip_unpack: false

      - name: Locate APK file
        id: apk
        run: |
          echo "=== APKs in artifact ==="
          find apk/ -name "*.apk" | sort
          echo "========================"

          # MUST use x86_64 APK — emulator is x86_64, aosp_atd has no ARM translation.
          # Installing arm64 on x86_64 without Houdini → INSTALL_FAILED_NO_MATCHING_ABIS.
          APK_PATH=$(find apk/ -name "*x86_64*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "⚠  No x86_64 APK found — falling back to any APK"
            APK_PATH=$(find apk/ -name "*.apk" | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found in artifact"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ Selected: $APK_PATH ($(du -sh $APK_PATH | cut -f1))"

      # ── Create output directories ─────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p screenshots logs

      # ── Write test script to a file ───────────────────────────────────────
      # The reactivecircus emulator runner executes each line of `script:` as
      # a separate `sh -c <line>`, so multi-line if/then/fi constructs fail.
      # Solution: write the full bash script to a file and call it from script:.
      - name: Write emulator test script
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          cat > test_jazzmax.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          APK_PATH="$1"

          echo "════════════════════════════════════"
          echo "  JazzMAX Emulator Test"
          echo "════════════════════════════════════"

          # Wait for emulator to be ready
          echo "⏳ Waiting for emulator..."
          adb wait-for-device
          adb shell input keyevent 82

          # Install APK
          echo ""
          echo "📦 Installing APK: $APK_PATH"
          adb install -r "$APK_PATH"
          echo "✅ APK installed"

          # Start logcat capture in background
          adb logcat -c
          adb logcat > logs/logcat_full.txt &
          LOGCAT_PID=$!

          # Launch the app
          echo ""
          echo "🚀 Launching JazzMAX..."
          adb shell am start -n com.jazzmax.app/.MainActivity
          echo "✅ App launched"

          # Screenshot 1: Splash screen (5s)
          sleep 5
          echo "📸 Screenshot 1: Splash screen"
          adb exec-out screencap -p > screenshots/01_splash.png
          echo "✅ Splash screenshot saved"

          # Screenshot 2: Home / loading state (20s)
          sleep 15
          echo "📸 Screenshot 2: Home screen"
          adb exec-out screencap -p > screenshots/02_home.png
          echo "✅ Home screenshot saved"

          # Screenshot 3: After catalog loads (30s)
          sleep 10
          echo "📸 Screenshot 3: Catalog loaded"
          adb exec-out screencap -p > screenshots/03_catalog.png
          echo "✅ Catalog screenshot saved"

          # Stop logcat
          kill "$LOGCAT_PID" 2>/dev/null || true

          # ── Crash analysis ────────────────────────────────────────────────
          echo ""
          echo "════════════════════════════════════"
          echo "  Crash Analysis"
          echo "════════════════════════════════════"

          CRASHED=false

          if grep -qE "FATAL EXCEPTION|fatal error|com\.jazzmax\.app.*died" logs/logcat_full.txt; then
            echo "❌ CRASH DETECTED in logcat!"
            grep -A 20 -E "FATAL EXCEPTION|fatal error" logs/logcat_full.txt | head -50 > logs/crash_report.txt || true
            cat logs/crash_report.txt
            CRASHED=true
          else
            echo "✅ No crashes detected"
          fi

          if grep -qE "FlutterError|Another exception was thrown|═{10}" logs/logcat_full.txt; then
            echo "⚠  Flutter errors found:"
            grep -A 5 -E "FlutterError|Another exception was thrown" logs/logcat_full.txt | head -40 >> logs/crash_report.txt 2>/dev/null || true
          fi

          # Extract JazzMAX-specific logs
          grep -E "JazzMAX|flutter|com\.jazzmax" logs/logcat_full.txt > logs/jazzmax_logs.txt 2>/dev/null || true

          echo ""
          echo "════════════════════════════════════"
          echo "  Network / API Connectivity"
          echo "════════════════════════════════════"

          if grep -qE "api/catalog|api/auth|jazzmax" logs/logcat_full.txt; then
            echo "✅ App made API calls — network is working"
          else
            echo "⚠  No API calls detected — app may have crashed before connecting"
          fi

          # Final status
          echo ""
          if [ "$CRASHED" = "true" ]; then
            echo "❌ TEST RESULT: CRASH DETECTED — check crash_report.txt"
            exit 1
          else
            echo "✅ TEST RESULT: App launched and ran without crashes"
          fi
SCRIPT_EOF
          chmod +x test_jazzmax.sh

      # ── Run emulator and install APK ──────────────────────────────────────
      - name: Install emulator system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpulse0 libgl1

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          profile: pixel_2
          avd-name: jazzmax_test_avd
          force-avd-creation: true
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-snapshot -no-audio -no-boot-anim -no-window -camera-back none -gpu swiftshader_indirect
          disable-animations: true
          emulator-boot-timeout: 300
          script: bash test_jazzmax.sh "${{ steps.apk.outputs.path }}"

      # ── Upload all results ────────────────────────────────────────────────
      - name: Upload screenshots and logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-test-${{ github.run_number }}
          path: |
            screenshots/
            logs/
          retention-days: 14

      - name: Print screenshot summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  Test artifacts uploaded:"
          echo "  → screenshots/01_splash.png   — Splash screen (5s)"
          echo "  → screenshots/02_home.png     — Home screen (20s)"
          echo "  → screenshots/03_catalog.png  — Catalog loaded (30s)"
          echo "  → logs/logcat_full.txt        — Full Android logcat"
          echo "  → logs/jazzmax_logs.txt       — JazzMAX-specific logs"
          echo "  → logs/crash_report.txt       — Crash details (if any)"
          echo ""
          echo "  Download from: GitHub → Actions → This run → Artifacts"
          echo "════════════════════════════════════════════════════════"
