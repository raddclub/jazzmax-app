name: Test JazzMAX on Android Emulator

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'APK build run number to test (leave blank for latest)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build JazzMAX APK"]
    types: [completed]

jobs:
  emulator-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Free disk space ───────────────────────────────────────────────────
      # Pixel 2 AVD needs ~7.4 GB for its userdata partition.
      # GitHub runners ship with ~20 GB free but pre-installed SDKs eat most of it.
      # Removing unused large packages recovers ~5–6 GB before the emulator runs.
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android/sdk/ndk \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/chromium \
                      /usr/share/swift \
                      /usr/local/share/powershell \
                      /opt/hostedtoolcache/go \
                      /opt/hostedtoolcache/PyPy
          sudo apt-get clean -qq
          echo "=== Disk after cleanup ==="
          df -h /

      # ── Download the APK ──────────────────────────────────────────────────
      - name: Download latest APK artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_apk.yml
          workflow_conclusion: success
          name_is_regexp: true
          name: jazzmax-debug-.*
          path: apk/
          search_artifacts: true
          skip_unpack: false

      - name: Locate APK file
        id: apk
        run: |
          echo "=== APKs in artifact ==="
          find apk/ -name "*.apk" | sort
          echo "========================"

          # Prefer x86_64 — emulator is x86_64, aosp_atd has no ARM translation.
          # Installing arm64 on x86_64 without Houdini → INSTALL_FAILED_NO_MATCHING_ABIS.
          APK_PATH=$(find apk/ -name "*x86_64*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "⚠  No x86_64 APK found — falling back to any APK"
            APK_PATH=$(find apk/ -name "*.apk" | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found in artifact"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ Selected: $APK_PATH ($(du -sh $APK_PATH | cut -f1))"

      # ── Create output directories ─────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p screenshots logs

      # ── System deps + KVM ─────────────────────────────────────────────────
      - name: Install emulator system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpulse0 libgl1

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Run COMPREHENSIVE emulator tests ──────────────────────────────────
      # test_jazzmax_full.sh covers all user flows in one run:
      #   Phase 1:  API smoke tests (register, login, catalog, plans, guest token)
      #   Phase 2:  Register flow (in-app UI)
      #   Phase 3:  Login flow (in-app UI)
      #   Phase 4:  Home screen browse + search
      #   Phase 5:  Play movie (tap card → detail sheet → Watch Now → player)
      #   Phase 6:  TV show episode navigation (ep1 vs ep2 logcat diff)
      #   Phase 7:  Downloads screen
      #   Phase 8:  Profile screen
      #   Phase 9:  Subscription plans screen
      #   Phase 10: Guest mode + 10-min limit (logcat verified)
      #   Phase 11: Search with multiple queries
      #   Phase 12: Crash + log analysis
      #
      # timeout-minutes 35: comprehensive test takes ~25 min
      #   (5 min emulator boot + ~20 min of all test phases)
      - name: Run comprehensive emulator tests
        timeout-minutes: 35
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          profile: pixel_2
          avd-name: jazzmax_test_avd
          force-avd-creation: true
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-snapshot -no-audio -no-boot-anim -no-window -camera-back none -gpu swiftshader_indirect -partition-size 4096
          disable-animations: true
          emulator-boot-timeout: 300
          script: bash test_jazzmax_full.sh "${{ steps.apk.outputs.path }}"

      # ── Upload ALL results ────────────────────────────────────────────────
      - name: Upload screenshots and logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-test-${{ github.run_number }}
          path: |
            screenshots/
            logs/
          retention-days: 14

      - name: Print test summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  Comprehensive test artifacts:"
          echo "  SCREENSHOTS (28+ total):"
          ls screenshots/*.png 2>/dev/null | while read f; do echo "  → $f"; done || echo "  (none)"
          echo ""
          echo "  LOGS:"
          ls logs/*.txt 2>/dev/null | while read f; do echo "  → $f ($(wc -l < $f) lines)"; done || echo "  (none)"
          echo ""
          echo "  Download: GitHub → Actions → This run → Artifacts"
          echo "════════════════════════════════════════════════════════"
