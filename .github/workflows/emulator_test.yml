name: Test JazzMAX on Android Emulator

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'APK build run number to test (leave blank for latest)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build JazzMAX APK"]
    types: [completed]

jobs:
  emulator-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Free disk space ───────────────────────────────────────────────────
      # Pixel 2 AVD needs ~7.4 GB for its userdata partition.
      # GitHub runners ship with ~20 GB free but pre-installed SDKs eat most of it.
      # Removing unused large packages recovers ~5–6 GB before the emulator runs.
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android/sdk/ndk \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/chromium \
                      /usr/share/swift \
                      /usr/local/share/powershell \
                      /opt/hostedtoolcache/go \
                      /opt/hostedtoolcache/PyPy
          sudo apt-get clean -qq
          echo "=== Disk after cleanup ==="
          df -h /

      # ── Download the APK ──────────────────────────────────────────────────
      - name: Download latest APK artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build_apk.yml
          workflow_conclusion: success
          name_is_regexp: true
          name: jazzmax-debug-.*
          path: apk/
          search_artifacts: true
          skip_unpack: false

      - name: Locate APK file
        id: apk
        run: |
          echo "=== APKs in artifact ==="
          find apk/ -name "*.apk" | sort
          echo "========================"

          # Prefer x86_64 — emulator is x86_64, aosp_atd has no ARM translation.
          # Installing arm64 on x86_64 without Houdini → INSTALL_FAILED_NO_MATCHING_ABIS.
          APK_PATH=$(find apk/ -name "*x86_64*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "⚠  No x86_64 APK found — falling back to any APK"
            APK_PATH=$(find apk/ -name "*.apk" | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found in artifact"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "✅ Selected: $APK_PATH ($(du -sh $APK_PATH | cut -f1))"

      # ── Create output directories ─────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p screenshots logs

      # ── System deps + KVM ─────────────────────────────────────────────────
      - name: Install emulator system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpulse0 libgl1

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Run emulator ──────────────────────────────────────────────────────
      # test_jazzmax.sh is committed in the repo root.
      # The reactivecircus action runs each `script:` line as a separate
      # `sh -c <line>`, so multi-line if/then/fi constructs break.
      # Calling a committed bash script avoids that entirely.
      #
      # -partition-size 4096: cap userdata partition at 4 GB (default Pixel 2
      # wants 7.4 GB which barely fits on GitHub runners, causing FATAL errors).
      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          profile: pixel_2
          avd-name: jazzmax_test_avd
          force-avd-creation: true
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-snapshot -no-audio -no-boot-anim -no-window -camera-back none -gpu swiftshader_indirect -partition-size 4096
          disable-animations: true
          emulator-boot-timeout: 300
          script: bash test_jazzmax.sh "${{ steps.apk.outputs.path }}"

      # ── Upload results ────────────────────────────────────────────────────
      - name: Upload screenshots and logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-test-${{ github.run_number }}
          path: |
            screenshots/
            logs/
          retention-days: 14

      - name: Print screenshot summary
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  Test artifacts uploaded:"
          echo "  → screenshots/01_splash.png   — Splash screen (5s)"
          echo "  → screenshots/02_home.png     — Home screen (20s)"
          echo "  → screenshots/03_catalog.png  — Catalog loaded (30s)"
          echo "  → logs/logcat_full.txt        — Full Android logcat"
          echo "  → logs/jazzmax_logs.txt       — JazzMAX-specific logs"
          echo "  → logs/crash_report.txt       — Crash details (if any)"
          echo ""
          echo "  Download from: GitHub → Actions → This run → Artifacts"
          echo "════════════════════════════════════════════════════════"
