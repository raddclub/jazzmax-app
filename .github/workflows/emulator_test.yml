name: Test ZENO on Android Emulator

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'APK build run number to test (leave blank for latest)'
        required: false
        default: ''
  workflow_run:
    workflows: ["Build ZENO APK"]
    types: [completed]

jobs:
  emulator-test:
    runs-on: ubuntu-latest
    if: >
      github.event_name == \'workflow_dispatch\' ||
      github.event.workflow_run.conclusion == \'success\'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest APK artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-apk.yml
          workflow_conclusion: success
          name_is_regexp: true
          name: ZENO-.*
          path: apk/
          search_artifacts: true
          skip_unpack: false

      - name: Locate APK file
        id: apk
        run: |
          APK_PATH=$(find apk/ -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK found: $APK_PATH ($(du -sh $APK_PATH | cut -f1))"

      - name: Create output directories
        run: mkdir -p screenshots logs

      - name: Enable KVM
        run: |
          echo \'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"\' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_2
          avd-name: zeno_test_avd
          ram-size: 2048M
          heap-size: 512M
          emulator-options: -no-snapshot -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "ZENO Emulator Test"
            adb wait-for-device
            adb shell input keyevent 82
            echo "Installing APK..."
            adb install -r "${{ steps.apk.outputs.path }}"
            echo "APK installed"
            adb logcat -c
            adb logcat > logs/logcat_full.txt &
            LOGCAT_PID=$!
            echo "Launching ZENO..."
            adb shell am start -n com.zeno.app/.MainActivity
            sleep 5
            adb exec-out screencap -p > screenshots/01_splash.png
            sleep 15
            adb exec-out screencap -p > screenshots/02_home.png
            sleep 10
            adb exec-out screencap -p > screenshots/03_catalog.png
            kill $LOGCAT_PID 2>/dev/null || true
            if grep -q "FATAL EXCEPTION\|fatal error\|com.zeno.app.*died" logs/logcat_full.txt; then
              echo "CRASH DETECTED"
              grep -A 20 "FATAL EXCEPTION\|fatal error" logs/logcat_full.txt | head -50 > logs/crash_report.txt
              cat logs/crash_report.txt
              exit 1
            else
              echo "No crashes detected"
            fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-test-${{ github.run_number }}
          path: |
            screenshots/
            logs/
          retention-days: 14
