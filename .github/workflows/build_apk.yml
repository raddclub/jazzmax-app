name: Build JazzMAX APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build JazzMAX APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by Gradle / AGP) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Flutter stable ─────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      # ── 4. local.properties (Gradle needs sdk.dir + flutter.sdk) ─────────
      - name: Create local.properties
        run: |
          mkdir -p jazzmax_flutter/android
          echo "flutter.sdk=$FLUTTER_ROOT"  > jazzmax_flutter/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> jazzmax_flutter/android/local.properties
          echo "local.properties written:"
          cat jazzmax_flutter/android/local.properties

      # ── 5. Dependencies (verbose so we see exactly what fails) ───────────
      - name: Flutter pub get
        working-directory: jazzmax_flutter
        run: flutter pub get --verbose

      # ── 6. Analyze (non-blocking — warnings don't stop the build) ────────
      - name: Flutter analyze
        working-directory: jazzmax_flutter
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      # ── 7. Build DEBUG APK (always — no keystore needed) ─────────────────
      - name: Build debug APK
        working-directory: jazzmax_flutter
        run: |
          flutter build apk \
            --debug \
            --no-tree-shake-icons \
            --build-number=${{ github.run_number }}
        env:
          FLUTTER_BUILD_NUMBER: ${{ github.run_number }}

      - name: Debug APK info
        run: |
          APK=jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk
          if [ -f "$APK" ]; then
            echo "✅ Debug APK built — $(du -sh $APK | cut -f1)"
          else
            echo "❌ Debug APK missing"
            exit 1
          fi

      # ── 8. Build RELEASE APK (only when keystore secrets are provided) ───
      - name: Create keystore directory
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: mkdir -p jazzmax_flutter/android/app/keystore

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" \
            | base64 --decode \
            > jazzmax_flutter/android/app/keystore/jazzmax.keystore
          echo "Keystore decoded ($(du -sh jazzmax_flutter/android/app/keystore/jazzmax.keystore | cut -f1))"
        continue-on-error: true

      - name: Build release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: jazzmax_flutter
        env:
          KEYSTORE_PATH: keystore/jazzmax.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'jazzmax' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --build-number=${{ github.run_number }}
        continue-on-error: true

      # ── 9. Upload APK artifacts ───────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jazzmax-debug-${{ github.run_number }}
          path: jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: jazzmax-release-${{ github.run_number }}
          path: jazzmax_flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true

      # ── 10. Create GitHub Release on main push ────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "JazzMAX Build #${{ github.run_number }}"
          body: |
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Install on Android phone
            1. Download **app-debug.apk** below
            2. Copy to your phone
            3. Settings → Security → **Allow install from unknown sources**
            4. Open the APK and install

            > This is a debug build — full features enabled, no keystore signature needed.
          files: jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ── 11. Oracle emulator test (only if ORACLE_SSH_KEY secret exists) ───
      - name: Deploy to Oracle emulator
        if: ${{ secrets.ORACLE_SSH_KEY != '' }}
        run: |
          printf '%s' "${{ secrets.ORACLE_SSH_KEY }}" > /tmp/oracle_key
          chmod 600 /tmp/oracle_key

          ORACLE_IP="92.4.95.252"
          APK="jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk"

          echo "📤 Copying APK to Oracle server..."
          scp -i /tmp/oracle_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "$APK" ubuntu@$ORACLE_IP:/tmp/jazzmax-latest.apk

          echo "🤖 Running emulator test..."
          ssh -i /tmp/oracle_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=60 \
              ubuntu@$ORACLE_IP \
              'bash /opt/jazzmax/scripts/emulator_test.sh /tmp/jazzmax-latest.apk'

          echo "📸 Downloading screenshots..."
          mkdir -p /tmp/screenshots
          scp -i /tmp/oracle_key \
              -o StrictHostKeyChecking=no \
              ubuntu@$ORACLE_IP:"/tmp/jazzmax_screenshots/*.png" \
              /tmp/screenshots/ 2>/dev/null || echo "No screenshots yet"

          rm -f /tmp/oracle_key
        continue-on-error: true

      - name: Upload Oracle screenshots
        if: ${{ secrets.ORACLE_SSH_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: oracle-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7
        continue-on-error: true
