name: Build JazzMAX APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ── CRITICAL: contents:write is required to create GitHub Releases ────────────
permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build JazzMAX APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create local.properties
        run: |
          mkdir -p jazzmax_flutter/android
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_ROOT" "$ANDROID_SDK_ROOT" \
            > jazzmax_flutter/android/local.properties

      - name: Flutter pub get
        working-directory: jazzmax_flutter
        run: flutter pub get

      - name: Flutter analyze
        working-directory: jazzmax_flutter
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      # ── Build split APKs (one per CPU architecture) ───────────────────────
      # --split-per-abi reduces size from ~120 MB → ~40 MB per APK.
      # Produces: app-debug-arm64-v8a.apk  (all modern phones)
      #           app-debug-armeabi-v7a.apk (older 32-bit phones)
      #           app-debug-x86_64.apk      (emulators / x86 tablets)
      - name: Build debug APKs (split by ABI)
        working-directory: jazzmax_flutter
        run: flutter build apk --debug --split-per-abi --no-tree-shake-icons

      - name: APK sizes
        run: |
          echo "=== APK sizes after split-per-abi ==="
          du -sh jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-*.apk

      # ── Upload all split APKs as one artifact (for emulator test) ─────────
      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: jazzmax-debug-${{ github.run_number }}
          path: jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-*.apk
          retention-days: 14

      # ── Create GitHub Release with arm64-v8a APK ──────────────────────────
      # arm64-v8a covers every Android phone sold since ~2016 (including all Jazz users)
      # This is what Rehan should download and install on his phone.
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "JazzMAX Build #${{ github.run_number }}"
          body: |
            Auto-build from commit `${{ github.sha }}`

            ## Install on your phone (arm64 — all modern Android phones)

            1. Download **app-debug-arm64-v8a.apk** below ← this is the one you want
            2. Open the APK on your phone → tap Install
            3. If prompted: Settings → Allow install from unknown sources → try again

            ---
            _Also included: armeabi-v7a (old 32-bit phones) · x86_64 (emulators)_
          files: |
            jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-arm64-v8a.apk
            jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-armeabi-v7a.apk
            jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-x86_64.apk
          prerelease: true

      - name: Deploy to Oracle emulator
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          printf '%s' "$ORACLE_SSH_KEY" > /tmp/oracle_key
          chmod 600 /tmp/oracle_key
          APK="jazzmax_flutter/build/app/outputs/flutter-apk/app-debug-arm64-v8a.apk"
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              "$APK" ubuntu@92.4.95.252:/tmp/jazzmax-latest.apk
          ssh -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              ubuntu@92.4.95.252 'bash /opt/jazzmax/scripts/emulator_test.sh /tmp/jazzmax-latest.apk'
          mkdir -p /tmp/screenshots
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no \
              ubuntu@92.4.95.252:"/tmp/jazzmax_screenshots/*.png" /tmp/screenshots/ 2>/dev/null || true
          rm -f /tmp/oracle_key
        continue-on-error: true

      - name: Upload Oracle screenshots
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        uses: actions/upload-artifact@v4
        with:
          name: oracle-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7
        continue-on-error: true
