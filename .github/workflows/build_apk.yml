name: Build JazzMAX APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ── CRITICAL: contents:write is required to create GitHub Releases ────────────
permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build JazzMAX APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create local.properties
        run: |
          mkdir -p jazzmax_flutter/android
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_ROOT" "$ANDROID_SDK_ROOT" \
            > jazzmax_flutter/android/local.properties

      - name: Flutter pub get
        working-directory: jazzmax_flutter
        run: flutter pub get

      # ── Extract version from pubspec so it appears in APK names + release ──
      - name: Extract app version
        id: ver
        run: |
          VERSION=$(grep '^version:' jazzmax_flutter/pubspec.yaml | awk '{print $2}')
          SEMVER=$(echo "$VERSION" | cut -d'+' -f1)
          BUILD=$(echo "$VERSION" | cut -d'+' -f2)
          echo "version=$VERSION"   >> $GITHUB_OUTPUT
          echo "semver=$SEMVER"     >> $GITHUB_OUTPUT
          echo "build=$BUILD"       >> $GITHUB_OUTPUT
          echo "label=v${SEMVER}-build${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "App version: $VERSION  →  label: v${SEMVER}-build${{ github.run_number }}"

      - name: Flutter analyze
        working-directory: jazzmax_flutter
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      # ── Build split APKs (one per CPU architecture) ───────────────────────
      # --split-per-abi reduces size from ~120 MB → ~40 MB per APK.
      # Produces: app-debug-arm64-v8a.apk  (all modern phones — what Rehan installs)
      #           app-debug-armeabi-v7a.apk (older 32-bit phones)
      #           app-debug-x86_64.apk      (emulators / x86 tablets)
      - name: Build debug APKs (split by ABI)
        working-directory: jazzmax_flutter
        run: flutter build apk --debug --split-per-abi --no-tree-shake-icons

      # ── Discover APK paths (Flutter output dir varies) ────────────────────
      # Captures the actual paths so later steps are not path-sensitive.
      - name: Locate built APKs
        id: apks
        run: |
          echo "=== All APKs in build output ==="
          find jazzmax_flutter/build -name "*.apk" | sort

          # Prefer flutter-apk/ output dir (flutter build copies here)
          # Fallback: standard Gradle apk/debug/ output
          ARM64=$(find jazzmax_flutter/build -name "*arm64*debug*.apk" -o -name "*debug*arm64*.apk" -o -name "app-debug-arm64-v8a.apk" 2>/dev/null | head -1)
          ARMV7=$(find jazzmax_flutter/build -name "*armeabi*debug*.apk" -o -name "*debug*armeabi*.apk" -o -name "app-debug-armeabi-v7a.apk" 2>/dev/null | head -1)
          X86_64=$(find jazzmax_flutter/build -name "*x86_64*debug*.apk" -o -name "*debug*x86_64*.apk" -o -name "app-debug-x86_64.apk" 2>/dev/null | head -1)

          # Fallback: single unsplit debug APK (if split-per-abi wasn't used)
          if [ -z "$ARM64" ]; then
            ARM64=$(find jazzmax_flutter/build -name "app-debug.apk" 2>/dev/null | head -1)
          fi

          echo "arm64=$ARM64" >> $GITHUB_OUTPUT
          echo "armv7=$ARMV7" >> $GITHUB_OUTPUT
          echo "x86_64=$X86_64" >> $GITHUB_OUTPUT

          echo ""
          echo "arm64  → $ARM64"
          echo "armv7  → $ARMV7"
          echo "x86_64 → $X86_64"

          if [ -z "$ARM64" ]; then
            echo "❌ ERROR: No debug APK found at all"
            exit 1
          fi

          echo ""
          echo "=== APK sizes ==="
          for f in "$ARM64" "$ARMV7" "$X86_64"; do
            [ -n "$f" ] && [ -f "$f" ] && du -sh "$f" || true
          done

      # ── Rename APKs to include version + run number (so you can tell builds apart) ──
      - name: Rename APKs with version label
        id: renamed
        run: |
          LABEL="${{ steps.ver.outputs.label }}"
          OUT_DIR="jazzmax_flutter/build/versioned"
          mkdir -p "$OUT_DIR"

          rename_apk() {
            local src="$1" suffix="$2"
            if [ -n "$src" ] && [ -f "$src" ]; then
              local dest="$OUT_DIR/jazzmax-${LABEL}-${suffix}.apk"
              cp "$src" "$dest"
              echo "$dest"
            fi
          }

          ARM64_NEW=$(rename_apk "${{ steps.apks.outputs.arm64 }}"  "arm64")
          ARMV7_NEW=$(rename_apk "${{ steps.apks.outputs.armv7 }}"  "arm32")
          X86_NEW=$(rename_apk   "${{ steps.apks.outputs.x86_64 }}" "x86_64")

          echo "arm64=$ARM64_NEW"   >> $GITHUB_OUTPUT
          echo "armv7=$ARMV7_NEW"   >> $GITHUB_OUTPUT
          echo "x86_64=$X86_NEW"    >> $GITHUB_OUTPUT

          echo "=== Versioned APKs ==="
          ls -lh "$OUT_DIR/"

      # ── Upload versioned APKs as artifact ─────────────────────────────────
      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: jazzmax-${{ steps.ver.outputs.label }}-run${{ github.run_number }}
          path: jazzmax_flutter/build/versioned/
          if-no-files-found: error
          retention-days: 14

      # ── Create GitHub Release ─────────────────────────────────────────────
      # arm64 covers every Android phone sold since ~2016 (including Jazz users).
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.ver.outputs.label }}
          name: "JazzMAX ${{ steps.ver.outputs.label }}"
          body: |
            **Version:** `${{ steps.ver.outputs.semver }}` · **Build:** #${{ github.run_number }}
            **Commit:** `${{ github.sha }}`

            ## What changed in this build
            - Fixed: app now points to Oracle server (`http://92.4.95.252`) — content will load
            - Fixed: hardcoded fallback URL was a dead Replit dev domain — corrected to Oracle IP
            - Added: version number visible on Splash screen and Profile → App Info
            - Added: Profile screen shows which server the app is connecting to
            - Added: Home screen shows real error message (not "No content yet") when server is unreachable
            - Changed: APK filenames now include version + build number so you can confirm which build you have

            ## Install on your phone

            1. Download **`jazzmax-${{ steps.ver.outputs.label }}-arm64.apk`** below ← this is the one you want
            2. Transfer to your Android phone
            3. Open the APK → tap Install
            4. If prompted: Settings → Allow install from unknown sources → try again
            5. Open the app → Profile tab → App Info — confirms version `${{ steps.ver.outputs.semver }}`

            ---
            _Also included: arm32 (old 32-bit phones) · x86_64 (emulators)_
          files: |
            ${{ steps.renamed.outputs.arm64 }}
            ${{ steps.renamed.outputs.armv7 }}
            ${{ steps.renamed.outputs.x86_64 }}
          prerelease: false
          fail_on_unmatched_files: false

      - name: Deploy to Oracle emulator
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          printf '%s' "$ORACLE_SSH_KEY" > /tmp/oracle_key
          chmod 600 /tmp/oracle_key
          APK="${{ steps.renamed.outputs.arm64 }}"
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              "$APK" ubuntu@92.4.95.252:/tmp/jazzmax-latest.apk
          ssh -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              ubuntu@92.4.95.252 'bash /opt/jazzmax/scripts/emulator_test.sh /tmp/jazzmax-latest.apk'
          mkdir -p /tmp/screenshots
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no \
              ubuntu@92.4.95.252:"/tmp/jazzmax_screenshots/*.png" /tmp/screenshots/ 2>/dev/null || true
          rm -f /tmp/oracle_key
        continue-on-error: true

      - name: Upload Oracle screenshots
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        uses: actions/upload-artifact@v4
        with:
          name: oracle-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7
        continue-on-error: true
