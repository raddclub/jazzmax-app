name: Build JazzMAX APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build JazzMAX APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create local.properties
        run: |
          mkdir -p jazzmax_flutter/android
          printf "flutter.sdk=%s\nsdk.dir=%s\n" "$FLUTTER_ROOT" "$ANDROID_SDK_ROOT" \
            > jazzmax_flutter/android/local.properties

      - name: Flutter pub get
        working-directory: jazzmax_flutter
        run: flutter pub get

      - name: Flutter analyze
        working-directory: jazzmax_flutter
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Build debug APK
        working-directory: jazzmax_flutter
        run: flutter build apk --debug --no-tree-shake-icons

      - name: APK size
        run: du -sh jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jazzmax-debug-${{ github.run_number }}
          path: jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "JazzMAX Build #${{ github.run_number }}"
          body: |
            Auto-build from `${{ github.sha }}`

            **Install on Android:**
            1. Download **app-debug.apk** below
            2. Copy to phone → open → install
            3. Enable "Install from unknown sources" if prompted
          files: jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Deploy to Oracle emulator
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          printf '%s' "$ORACLE_SSH_KEY" > /tmp/oracle_key
          chmod 600 /tmp/oracle_key
          APK="jazzmax_flutter/build/app/outputs/flutter-apk/app-debug.apk"
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
              "$APK" ubuntu@92.4.95.252:/tmp/jazzmax-latest.apk
          ssh -i /tmp/oracle_key -o StrictHostKeyChecking=no -o ConnectTimeout=60 \
              ubuntu@92.4.95.252 'bash /opt/jazzmax/scripts/emulator_test.sh /tmp/jazzmax-latest.apk'
          mkdir -p /tmp/screenshots
          scp -i /tmp/oracle_key -o StrictHostKeyChecking=no \
              ubuntu@92.4.95.252:"/tmp/jazzmax_screenshots/*.png" /tmp/screenshots/ 2>/dev/null || true
          rm -f /tmp/oracle_key
        continue-on-error: true

      - name: Upload Oracle screenshots
        if: env.ORACLE_SSH_KEY != ''
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        uses: actions/upload-artifact@v4
        with:
          name: oracle-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7
        continue-on-error: true
