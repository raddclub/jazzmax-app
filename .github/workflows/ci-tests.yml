name: RaddFlix CI — Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: API test suite against live Oracle server
  # ──────────────────────────────────────────────────────────────
  api-tests:
    name: API & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run API test suite
        id: tests
        run: |
          set +e
          node raddflix_flutter/test_suite/run_tests.js 2>&1 | tee /tmp/test_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Extract pass/fail counts
          PASSED=$(grep -oP '✅ \K[0-9]+(?=\s+passed)' /tmp/test_output.txt | tail -1)
          FAILED=$(grep -oP '❌ \K[0-9]+(?=\s+failed)' /tmp/test_output.txt | tail -1)
          WARNED=$(grep -oP '⚠️  \K[0-9]+(?=\s+warned)' /tmp/test_output.txt | tail -1)
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "warned=${WARNED:-0}" >> $GITHUB_OUTPUT
          exit 0

      - name: Write test summary
        run: |
          echo "## RaddFlix API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | ${{ steps.tests.outputs.passed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${{ steps.tests.outputs.failed }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Warned | ${{ steps.tests.outputs.warned }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload test output
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: /tmp/test_output.txt
          retention-days: 14

      - name: Fail if too many errors
        run: |
          FAILED=${{ steps.tests.outputs.failed }}
          if [ "${FAILED:-0}" -gt 5 ]; then
            echo "::error::$FAILED test(s) failed — see summary above"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 2: Flutter static analysis (no device needed)
  # ──────────────────────────────────────────────────────────────
  flutter-analyze:
    name: Flutter Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: raddflix_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: raddflix_flutter
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze_output.txt
          echo "## Flutter Analysis" >> $GITHUB_STEP_SUMMARY
          if grep -q "No issues found" /tmp/analyze_output.txt; then
            echo "✅ **No issues found**" >> $GITHUB_STEP_SUMMARY
          else
            ERROR_COUNT=$(grep -c "error •" /tmp/analyze_output.txt || true)
            WARN_COUNT=$(grep -c "warning •" /tmp/analyze_output.txt || true)
            echo "| Errors | $ERROR_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Warnings | $WARN_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/analyze_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build APK (only on push to main, after tests pass)
  # ──────────────────────────────────────────────────────────────
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [api-tests, flutter-analyze]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: raddflix_flutter
        run: flutter pub get

      - name: Set up keystore
        working-directory: raddflix_flutter/android/app/keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > raddflix.keystore
          else
            keytool -genkeypair \
              -alias raddflix -keyalg RSA -keysize 2048 -validity 10000 \
              -keystore raddflix.keystore \
              -storepass "${KS_PASS:-RaddFlix_2024_Store}" \
              -keypass "${KEY_PASS:-RaddFlix_2024_Key}" \
              -dname "CN=RaddFlix,OU=Mobile,O=Radd Club,L=Karachi,ST=Sindh,C=PK" \
              -noprompt
          fi

      - name: Build release APK
        working-directory: raddflix_flutter
        env:
          KEYSTORE_PATH: keystore/raddflix.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename & upload APK
        id: apk
        run: |
          VERSION=$(grep "version:" raddflix_flutter/pubspec.yaml | awk '{print $2}')
          APK_NAME="RaddFlix-${VERSION}-build${{ github.run_number }}.apk"
          cp raddflix_flutter/build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "## APK Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`$APK_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -sh $APK_NAME | cut -f1)" >> $GITHUB_STEP_SUMMARY
          ls -lh "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_name }}
          body: |
            ## RaddFlix ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
            
            **Tests:** ${{ needs.api-tests.outputs.passed }} passed
            
            Install on Android 5.0+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job 4: Deploy to Oracle server (pull latest + restart)
  # Runs after APK build succeeds
  # ──────────────────────────────────────────────────────────────
  deploy-oracle:
    name: Deploy to Oracle Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-apk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_HOST: 92.4.95.252
          ORACLE_USER: ubuntu
        run: |
          if [ -z "$ORACLE_SSH_KEY" ]; then
            echo "::warning::ORACLE_SSH_KEY secret not set — skipping deploy"
            echo "## Deploy ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Set the ORACLE_SSH_KEY GitHub secret to enable auto-deploy." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$ORACLE_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${ORACLE_USER}@${ORACLE_HOST}" << 'ENDSSH'
            set -e
            echo "=== Pulling latest code ==="
            cd /opt/jazzmax
            git pull origin main
            echo "=== Restarting radd-hub ==="
            cd radd-hub
            python radd_hub.py restart
            echo "=== Done ==="
ENDSSH
          echo "## Deploy ✅ Done" >> $GITHUB_STEP_SUMMARY
          echo "Oracle server updated at $(date -u)" >> $GITHUB_STEP_SUMMARY
