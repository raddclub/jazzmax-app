name: "RaddFlix CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: API Tests (live Oracle server) ────────────────────────────────
  api-tests:
    name: "API Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run API test suite
        id: tests
        run: |
          node raddflix_flutter/test_suite/run_tests.js 2>&1 | tee /tmp/test_output.txt || true
          PASSED=$(grep -oE '[0-9]+ passed' /tmp/test_output.txt | grep -oE '[0-9]+' | tail -1 || echo 0)
          FAILED=$(grep -oE '[0-9]+ failed' /tmp/test_output.txt | grep -oE '[0-9]+' | tail -1 || echo 0)
          WARNED=$(grep -oE '[0-9]+ warned' /tmp/test_output.txt | grep -oE '[0-9]+' | tail -1 || echo 0)
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "warned=$WARNED" >> $GITHUB_OUTPUT
          echo "## RaddFlix API Tests" >> $GITHUB_STEP_SUMMARY
          echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| Warned | $WARNED |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: "test-results-${{ github.run_number }}"
          path: /tmp/test_output.txt
          retention-days: 14

      - name: Fail if too many errors
        run: |
          FAILED=${{ steps.tests.outputs.failed }}
          if [ "${FAILED:-0}" -gt 5 ]; then
            echo "::error::${FAILED} test(s) failed"
            exit 1
          fi

  # ── Job 2: Flutter static analysis ───────────────────────────────────────
  flutter-analyze:
    name: "Flutter Analyze"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: "stable"
          cache: true

      - name: Get dependencies
        working-directory: raddflix_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: raddflix_flutter
        run: |
          flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.txt || true
          echo "## Flutter Analysis" >> $GITHUB_STEP_SUMMARY
          if grep -q "No issues found" /tmp/analyze.txt; then
            echo "No issues found." >> $GITHUB_STEP_SUMMARY
          else
            ERRORS=$(grep -c "error " /tmp/analyze.txt || echo 0)
            echo "Errors: $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Details</summary>" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/analyze.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Job 3: Build APK (push to main only, after tests pass) ───────────────
  build-apk:
    name: "Build Release APK"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [api-tests, flutter-analyze]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        working-directory: raddflix_flutter
        run: flutter pub get

      - name: Setup keystore
        working-directory: raddflix_flutter/android/app/keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > raddflix.keystore
          else
            keytool -genkeypair -alias raddflix -keyalg RSA -keysize 2048 -validity 10000 \
              -keystore raddflix.keystore \
              -storepass "${KS_PASS:-RaddFlix_2024_Store}" \
              -keypass "${KEY_PASS:-RaddFlix_2024_Key}" \
              -dname "CN=RaddFlix,OU=Mobile,O=Radd Club,L=Karachi,ST=Sindh,C=PK" \
              -noprompt
          fi

      - name: Build APK
        working-directory: raddflix_flutter
        env:
          KEYSTORE_PATH: keystore/raddflix.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload APK
        id: apk
        run: |
          VERSION=$(grep "^version:" raddflix_flutter/pubspec.yaml | awk '{print $2}')
          NAME="RaddFlix-${VERSION}-build${{ github.run_number }}.apk"
          cp raddflix_flutter/build/app/outputs/flutter-apk/app-release.apk "$NAME"
          echo "apk_name=$NAME" >> $GITHUB_OUTPUT
          echo "## APK Built" >> $GITHUB_STEP_SUMMARY
          echo "File: $NAME  |  Size: $(du -sh $NAME | cut -f1)" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: "${{ steps.apk.outputs.apk_name }}"
          path: "${{ steps.apk.outputs.apk_name }}"
          retention-days: 30

      - name: Create Release (on tag)
        if: "startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ steps.apk.outputs.apk_name }}"
          body: "RaddFlix ${{ github.ref_name }} — built from ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4: Deploy to Oracle server ───────────────────────────────────────
  deploy:
    name: "Deploy to Oracle"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-apk]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"
    steps:
      - name: SSH deploy
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_HOST: "92.4.95.252"
          ORACLE_USER: "ubuntu"
        run: |
          if [ -z "$ORACLE_SSH_KEY" ]; then
            echo "::warning::ORACLE_SSH_KEY not set - skipping deploy"
            echo "Set the ORACLE_SSH_KEY secret to enable auto-deploy." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${ORACLE_USER}@${ORACLE_HOST}" \
            "cd /opt/jazzmax && git pull origin main && cd radd-hub && python radd_hub.py restart && echo DEPLOYED"
          echo "Oracle server updated." >> $GITHUB_STEP_SUMMARY
