name: Build RaddFlix APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag e.g. v1.0.0"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: "stable"
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Flutter pub get
        working-directory: raddflix_flutter
        run: flutter pub get


      - name: Patch Gradle namespace for AGP 8 (fix legacy pub packages)
        working-directory: raddflix_flutter
        run: |
          # AGP 8+ requires 'namespace' in every library module's build.gradle.
          # Some pub.dev packages (gal, image_gallery_saver, saver_gallery, etc.) pre-date this.
          # We patch any offending package in the pub cache before the build.
          find ~/.pub-cache -name "build.gradle" -path "*/android/*" | while read f; do
            if grep -qE "compileSdkVersion flutter\.compileSdkVersion|compileSdk flutter\.compileSdkVersion" "$f" 2>/dev/null && ! grep -q "namespace" "$f" 2>/dev/null; then
              PKG=$(basename "$(dirname "$(dirname "$(dirname "$f")")")")
              echo "Patching namespace for: $PKG  ($f)"
              # Replace flutter.compileSdkVersion with a concrete value
              sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 34/g' "$f"
              sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 34/g' "$f"
              # Inject namespace after 'android {' opening brace
              SAFE_PKG=$(echo "$PKG" | tr '-' '_' | tr '.' '_' | cut -c1-40)
              sed -i "s/android {/android {\n    namespace \"com.patch.${SAFE_PKG}\"/" "$f"
              echo "  Done."
            fi
          done
          echo "Namespace patch complete."

      - name: Set up keystore
        working-directory: raddflix_flutter/android/app/keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Restoring keystore from secret..."
            echo "$KEYSTORE_B64" | base64 -d > raddflix.keystore
            echo "Keystore restored OK"
          else
            echo "No KEYSTORE_BASE64 found - generating new keystore..."
            keytool -genkeypair \
              -alias raddflix \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore raddflix.keystore \
              -storepass "${KS_PASS:-RaddFlix_2024_Store}" \
              -keypass "${KEY_PASS:-RaddFlix_2024_Key}" \
              -dname "CN=RaddFlix,OU=Mobile,O=Radd Club,L=Karachi,ST=Sindh,C=PK" \
              -noprompt
            echo "Keystore generated. Save this as KEYSTORE_BASE64 GitHub secret:"
            base64 -w 0 raddflix.keystore
          fi

      - name: Build release APK
        working-directory: raddflix_flutter
        env:
          KEYSTORE_PATH: keystore/raddflix.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK with version
        id: apk
        run: |
          VERSION=$(grep "version:" raddflix_flutter/pubspec.yaml | awk '{print $2}' | tr -d "'" | tr -d '"')
          APK_NAME="RaddFlix-${VERSION}-build${{ github.run_number }}.apk"
          cp raddflix_flutter/build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: RaddFlix ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.apk.outputs.apk_name }}
          body: |
            ## RaddFlix APK
            Built from commit ${{ github.sha }}
            Install on Android 5.0+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

