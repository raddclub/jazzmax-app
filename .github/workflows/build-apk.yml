name: Build ZENO APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag e.g. v1.0.0"
        required: false
        default: ""

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        working-directory: jazzmax_flutter
        run: flutter pub get

      - name: Set up keystore
        working-directory: jazzmax_flutter/android/app
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Restoring keystore from secret..."
            echo "$KEYSTORE_B64" | base64 -d > keystore/zeno.keystore
            echo "Keystore restored OK"
          else
            echo "Generating new keystore..."
            keytool -genkeypair \
              -alias zeno \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore keystore/zeno.keystore \
              -storepass "${KS_PASS:-ZENO_2025_Store}" \
              -keypass "${KEY_PASS:-ZENO_2025_Key}" \
              -dname "CN=ZENO,OU=Mobile,O=Radd Club,L=Karachi,ST=Sindh,C=PK" \
              -noprompt
          fi

      - name: Build release APK
        working-directory: jazzmax_flutter
        env:
          KEYSTORE_PATH: keystore/zeno.keystore
          KEYSTORE_TYPE: JKS
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: zeno
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        id: apk
        run: |
          VERSION=$(grep "version:" jazzmax_flutter/pubspec.yaml | awk '{print $2}' | tr -d "\047" | tr -d \'\")
          APK_NAME="ZENO-${VERSION}-build${{ github.run_number }}.apk"
          cp jazzmax_flutter/build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          ls -lh "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: ZENO ${{ github.event.inputs.release_tag || github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.apk.outputs.apk_name }}
          body: |
            ## ZENO App
            Sub Dekho, Dil Kholke
            Built from commit ${{ github.sha }}
            Install on Android 5.0+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
