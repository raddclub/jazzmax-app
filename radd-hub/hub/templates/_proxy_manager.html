{# ── Proxy Manager Modal ── #}
<div id="proxy-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9500;align-items:center;justify-content:center">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:480px;width:92%;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.5)">
    <button onclick="closeProxyModal()" style="position:absolute;top:10px;right:12px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;z-index:10">✕</button>
    
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
      <h3 style="margin:0">JazzDrive Proxy Settings</h3>
      <label class="toggle-switch" style="flex-shrink:0">
        <input type="checkbox" id="proxy-toggle" onchange="toggleProxyEnabled(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div id="proxy-list-container" style="display:none">
      <div class="muted" style="font-size:12px; margin-bottom:12px">
        Proxy is recommended if you're not receiving OTP. Use Pakistani proxies for best results.
      </div>
      
      <div id="proxy-list" style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px">
        <!-- Proxies will be injected here -->
      </div>
      
      <div style="display:flex; gap:8px; margin-top:12px">
        <input type="text" id="new-proxy-url" placeholder="http://user:pass@host:port" style="flex:1; font-size:13px">
        <button class="ghost" onclick="addNewProxy()" style="font-size:13px; padding:4px 12px">+ Add</button>
      </div>
      <div id="proxy-status-msg" class="muted" style="font-size:12px; margin-top:10px; min-height:16px; border-top: 1px solid var(--border); padding-top: 8px"></div>
    </div>
    
    <div style="margin-top:20px; text-align:right">
      <button class="primary" onclick="closeProxyModal()">Close</button>
    </div>
  </div>
</div>

<script>
let _allProxies = [];
let _activeProxyUrl = '';

function showProxyModal() {
  document.getElementById('proxy-modal-overlay').style.display = 'flex';
  loadProxies();
}

function closeProxyModal() {
  document.getElementById('proxy-modal-overlay').style.display = 'none';
}

async function loadProxies() {
  try {
    const d = await api('/settings/api/proxies');
    _allProxies = d.proxies || [];
    _activeProxyUrl = d.active_url || '';
    
    const toggle = document.getElementById('proxy-toggle');
    if (toggle) toggle.checked = d.enabled;
    
    const container = document.getElementById('proxy-list-container');
    if (container) container.style.display = d.enabled ? 'block' : 'none';
    
    renderProxyList();
  } catch (e) { console.error('Failed to load proxies:', e); }
}

function renderProxyList() {
  const list = document.getElementById('proxy-list');
  if (!list) return;
  
  if (_allProxies.length === 0) {
    list.innerHTML = '<div class="muted" style="font-size:12px; text-align:center; padding:8px">No proxies added yet.</div>';
    return;
  }
  
  list.innerHTML = _allProxies.map((p, idx) => {
    const isActive = p.url === _activeProxyUrl;
    const statusColor = p.status === 'working' ? 'var(--ok)' : (p.status === 'failed' ? 'var(--err)' : 'var(--muted)');
    const statusText = p.status === 'working' ? 'Working' : (p.status === 'failed' ? 'Failed' : 'Untested');
    const pingText = p.ping ? ` (${p.ping}ms)` : '';

    return `
      <div style="display:flex; align-items:center; gap:8px; padding:8px; background:var(--panel2); border-radius:8px; border:1px solid ${isActive ? 'var(--accent)' : 'var(--border)'}; position:relative">
        <input type="radio" name="proxy-select" ${isActive ? 'checked' : ''} onchange="selectProxy('${p.url}')" style="cursor:pointer; z-index:2; width:16px; height:16px">
        <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:monospace; font-size:12px" title="${p.url}">
          ${p.url}
          ${isActive ? '<span class="badge b-ok" style="font-size:9px; padding:1px 4px; margin-left:4px">Active</span>' : ''}
        </div>
        <div style="font-size:10px; color:${statusColor}; font-weight:bold; min-width:70px; text-align:right">${statusText}${pingText}</div>
        <button class="ghost" onclick="testProxyItem(${idx})" style="font-size:10px; padding:2px 6px; z-index:2">Test</button>
        <button class="ghost" onclick="removeProxy(${idx})" style="color:var(--err); font-size:10px; padding:2px 6px; z-index:2">✕</button>
      </div>
    `;
  }).join('');
}

async function toggleProxyEnabled(enabled) {
  try {
    await api('/settings/api/proxies/toggle', {method: 'POST', body: {enabled}});
    const container = document.getElementById('proxy-list-container');
    if (container) container.style.display = enabled ? 'block' : 'none';
    toast(enabled ? 'Proxy enabled' : 'Proxy disabled');
  } catch (e) { toast('Failed to toggle proxy'); }
}

async function selectProxy(url) {
  try {
    await api('/settings/api/proxies/select', {method: 'POST', body: {url}});
    _activeProxyUrl = url;
    renderProxyList();
    toast('Proxy selected as active');
  } catch (e) { toast('Failed to select proxy'); }
}

async function addNewProxy() {
  const input = document.getElementById('new-proxy-url');
  const url = input.value.trim();
  if (!url) return;
  
  if (_allProxies.some(p => p.url === url)) {
    toast('Proxy already exists');
    return;
  }
  
  _allProxies.push({url, status: 'untested'});
  input.value = '';
  await saveProxies();
  renderProxyList();
  
  if (!_activeProxyUrl) selectProxy(url);
}

async function removeProxy(idx) {
  const p = _allProxies[idx];
  if (p.url === _activeProxyUrl) {
    _activeProxyUrl = '';
    await api('/settings/api/proxies/select', {method: 'POST', body: {url: ''}});
  }
  _allProxies.splice(idx, 1);
  await saveProxies();
  renderProxyList();
}

async function saveProxies() {
  try {
    await api('/settings/api/proxies', {method: 'POST', body: {proxies: _allProxies}});
  } catch (e) { toast('Failed to save proxies'); }
}

async function testProxyItem(idx) {
  const p = _allProxies[idx];
  const msg = document.getElementById('proxy-status-msg');
  msg.textContent = 'Testing ' + p.url + '...';
  
  try {
    const d = await api('/settings/api/proxy-test', {method: 'POST', body: {url: p.url}});
    p.status = d.ok ? 'working' : 'failed';
    p.ping = d.ping || null;
    msg.textContent = d.ok ? '✓ ' + d.message : '✗ ' + d.message;
    msg.style.color = d.ok ? 'var(--ok)' : 'var(--err)';
    await saveProxies();
    renderProxyList();
  } catch (e) {
    p.status = 'failed';
    msg.textContent = 'Error: ' + e.message;
    msg.style.color = 'var(--err)';
    await saveProxies();
    renderProxyList();
  }
}

// Check status on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadProxies);
} else {
  loadProxies();
}
</script>
