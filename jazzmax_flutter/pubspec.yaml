name: jazzmax
description: JazzMAX - Pakistan ka entertainment, data-free
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Biometric + PIN auth for vault
  local_auth: ^2.3.0

  # SHA-256 PIN hashing for vault
  crypto: ^3.0.6

  # Video thumbnail generation for local/downloaded files
  video_thumbnail: ^0.5.3

  # Local SQLite
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0

  # Video player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # Image caching
  cached_network_image: ^3.4.1

  # Device info
  device_info_plus: ^10.1.2

  # Network
  connectivity_plus: ^6.1.1

  # Player controls
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7
  wakelock_plus: ^1.2.10

  # Storage
  shared_preferences: ^2.3.5

  # File picker for subtitles
  file_picker: ^8.1.7

  # Fonts
  google_fonts: ^6.2.1

  # --- NEW PACKAGES ---

  # Smooth declarative animations
  flutter_animate: ^4.5.2

  # Skeleton/shimmer loading
  shimmer: ^3.0.0

  # Onboarding page indicator
  smooth_page_indicator: ^1.2.0+3

  # Date formatting
  intl: ^0.19.0

  # App version info (for update check)
  package_info_plus: ^8.3.0

  # Open URLs (for update dialog)
  url_launcher: ^6.3.1

  # Disk space info for downloads screen
  disk_space_plus: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
