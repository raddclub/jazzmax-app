name: jazzmax
description: JazzMAX - Pakistan ka entertainment, data-free
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # HTTP client
  dio: ^5.4.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Biometric + PIN auth for vault
  local_auth: ^2.2.0

  # SHA-256 PIN hashing for vault
  crypto: ^3.0.3

  # Video thumbnail generation for local/downloaded files
  video_thumbnail: ^0.5.3

  # Local SQLite
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Video player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # Image caching
  cached_network_image: ^3.3.1

  # Device info
  device_info_plus: ^9.1.2

  # Network
  connectivity_plus: ^6.0.2

  # Player controls
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7
  wakelock_plus: ^1.1.4

  # Storage
  shared_preferences: ^2.2.2

  # File picker for subtitles
  file_picker: ^8.0.0

  # Fonts
  google_fonts: ^6.1.0

  # --- NEW PACKAGES ---

  # Smooth declarative animations
  flutter_animate: ^4.5.0

  # Skeleton/shimmer loading
  shimmer: ^3.0.0

  # Onboarding page indicator
  smooth_page_indicator: ^1.1.0

  # Date formatting
  intl: ^0.19.0

  # App version info (for update check)
  package_info_plus: ^8.0.2

  # Open URLs (for update dialog)
  url_launcher: ^6.3.0

  # Disk space info for downloads screen
  disk_space_plus: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
