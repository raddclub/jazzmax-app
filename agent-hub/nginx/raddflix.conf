# RaddFlix Oracle — nginx config (HTTP)
# Rate zones defined in /etc/nginx/conf.d/raddflix_security.conf

server {
    listen 80;
    server_name 92.4.95.252 _;
    server_tokens off;
    client_header_timeout 10s;
    client_body_timeout   15s;
    send_timeout          30s;
    keepalive_timeout     65s;
    large_client_header_buffers 4 8k;

    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-ancestors 'none';" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    if ($http_user_agent ~* "(sqlmap|nikto|nmap|masscan|zgrab)") { return 403; }

    # ── Rate-limited auth → radd-hub port 5000 (fixed mobile_api.py) ──────────
    location = /api/auth/register {
        limit_req zone=register_limit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:5000/api/auth/register;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location = /api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:5000/api/auth/login;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
    location = /api/auth/refresh {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:5000/api/auth/refresh;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
    location = /api/auth/guest {
        limit_req zone=guest_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:5000/api/auth/guest;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Flutter mobile API → radd-hub port 5000 (all fixed routes) ───────────
    location /api/auth/         { proxy_pass http://127.0.0.1:5000/api/auth/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 60s; }
    location /api/subscription/ { proxy_pass http://127.0.0.1:5000/api/subscription/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/usage/        { proxy_pass http://127.0.0.1:5000/api/usage/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/notifications/ { proxy_pass http://127.0.0.1:5000/api/notifications/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/history/      { proxy_pass http://127.0.0.1:5000/api/history/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/payment-methods { proxy_pass http://127.0.0.1:5000/api/payment-methods; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /api/recommend   { proxy_pass http://127.0.0.1:5000/api/recommend;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/recommend/    { proxy_pass http://127.0.0.1:5000/api/recommend/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/app/          { proxy_pass http://127.0.0.1:5000/api/app/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 15s; }
    location = /api/app/check   { proxy_pass http://127.0.0.1:5000/api/app/check;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 15s; }
    location /api/ping          { proxy_pass http://127.0.0.1:5000/api/ping;          proxy_set_header Host $host; }
    location /api/config        { proxy_pass http://127.0.0.1:5000/api/config;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── Catalog sync → radd-hub port 5000 (migrated from _watch_prototype) ────────────────────────────
    location /api/catalog/ { proxy_pass http://127.0.0.1:5000/api/catalog/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /api/search   { proxy_pass http://127.0.0.1:5000/api/search;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 30s; }
    location /api/poster/  { proxy_pass http://127.0.0.1:5000/api/poster/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 30s; }
    location /watch/       { proxy_pass http://127.0.0.1:6000/watch/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }

    # ── Admin panel → radd-hub port 5000 ─────────────────────────────────────
    location /auth/          { proxy_pass http://127.0.0.1:5000/auth/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /admin          { proxy_pass http://127.0.0.1:5000/admin;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /library/       { proxy_pass http://127.0.0.1:5000/library/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /scan/          { proxy_pass http://127.0.0.1:5000/scan/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /upload/        { proxy_pass http://127.0.0.1:5000/upload/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 300s; client_max_body_size 5G; }
    location /stream/        { proxy_pass http://127.0.0.1:5000/stream/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 300s; }
    location /bots/          { proxy_pass http://127.0.0.1:5000/bots/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /settings/      { proxy_pass http://127.0.0.1:5000/settings/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /organizer/     { proxy_pass http://127.0.0.1:5000/organizer/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /tid/           { proxy_pass http://127.0.0.1:5000/tid/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /app-users/     { proxy_pass http://127.0.0.1:5000/app-users/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /hub/           { proxy_pass http://127.0.0.1:5000/hub/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /analytics/     { proxy_pass http://127.0.0.1:5000/analytics/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /subscriptions/ { proxy_pass http://127.0.0.1:5000/subscriptions/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /broadcast/     { proxy_pass http://127.0.0.1:5000/broadcast/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /zero-rating/   { proxy_pass http://127.0.0.1:5000/zero-rating/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /plans/         { proxy_pass http://127.0.0.1:5000/plans/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /billing/       { proxy_pass http://127.0.0.1:5000/billing/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /d/             { proxy_pass http://127.0.0.1:5000/d/;             proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /migration      { proxy_pass http://127.0.0.1:5000/migration;      proxy_set_header Host $host; }
    location /healthz        { proxy_pass http://127.0.0.1:5000/healthz;        proxy_set_header Host $host; }
    location /api/db_mgmt/   { proxy_pass http://127.0.0.1:5000/api/db_mgmt/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /api/health/    { proxy_pass http://127.0.0.1:5000/api/health/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/tunnel/    { proxy_pass http://127.0.0.1:5000/api/tunnel/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── Catch-all /api/ → port 6000 (remaining watch-prototype routes) ────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location ~* /(\.env|\.git|\.htaccess|\.htpasswd|wp-admin|xmlrpc|phpmyadmin) { return 404; }
    location ~* \.(sql|bak|backup|cfg|ini|swp|old)$ { return 404; }

    location /health {
        return 200 "RaddFlix Oracle OK\n";
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
