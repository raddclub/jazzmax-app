# RaddFlix Oracle — HTTPS (self-signed, replace with Let's Encrypt when domain available)
server {
    listen 443 ssl;
    server_name 92.4.95.252 _;

    ssl_certificate     /etc/ssl/certs/raddflix.crt;
    ssl_certificate_key /etc/ssl/private/raddflix.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;
    client_header_timeout 10s;
    client_body_timeout   15s;
    send_timeout          30s;
    keepalive_timeout     65s;

    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Flutter mobile API → radd-hub port 5000 (fixed code)
    location /api/auth/        { proxy_pass http://127.0.0.1:5000/api/auth/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/subscription/ { proxy_pass http://127.0.0.1:5000/api/subscription/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location = /api/usage      { proxy_pass http://127.0.0.1:5000/api/usage;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/usage/        { proxy_pass http://127.0.0.1:5000/api/usage/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location = /api/notifications { proxy_pass http://127.0.0.1:5000/api/notifications; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/notifications/ { proxy_pass http://127.0.0.1:5000/api/notifications/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location = /api/history    { proxy_pass http://127.0.0.1:5000/api/history;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/history/      { proxy_pass http://127.0.0.1:5000/api/history/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /api/payment-methods { proxy_pass http://127.0.0.1:5000/api/payment-methods; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location = /api/recommend   { proxy_pass http://127.0.0.1:5000/api/recommend;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/recommend/    { proxy_pass http://127.0.0.1:5000/api/recommend/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/app/          { proxy_pass http://127.0.0.1:5000/api/app/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ping          { proxy_pass http://127.0.0.1:5000/api/ping;          proxy_set_header Host $host; }
    location /api/config        { proxy_pass http://127.0.0.1:5000/api/config;        proxy_set_header Host $host; }

    # Catalog sync → radd-hub port 5000 (migrated from _watch_prototype)
    location /api/catalog/ { proxy_pass http://127.0.0.1:5000/api/catalog/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /api/search   { proxy_pass http://127.0.0.1:5000/api/search;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/poster/  { proxy_pass http://127.0.0.1:5000/api/poster/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # Admin panel → radd-hub port 5000
    location /auth/        { proxy_pass http://127.0.0.1:5000/auth/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /admin        { proxy_pass http://127.0.0.1:5000/admin;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /library/     { proxy_pass http://127.0.0.1:5000/library/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /scan/        { proxy_pass http://127.0.0.1:5000/scan/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /upload/      { proxy_pass http://127.0.0.1:5000/upload/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 300s; client_max_body_size 5G; }
    location /stream/      { proxy_pass http://127.0.0.1:5000/stream/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 300s; }
    location /settings/    { proxy_pass http://127.0.0.1:5000/settings/;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /organizer/   { proxy_pass http://127.0.0.1:5000/organizer/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /analytics/   { proxy_pass http://127.0.0.1:5000/analytics/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /api/db_mgmt/ { proxy_pass http://127.0.0.1:5000/api/db_mgmt/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }

    # Catch-all /api/ fallback → port 6000
    location /api/ { proxy_pass http://127.0.0.1:5000/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }

    location /health {
        return 200 "RaddFlix Oracle OK\n";
        add_header Content-Type text/plain;
    }

    location / { proxy_pass http://127.0.0.1:5000/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
}
