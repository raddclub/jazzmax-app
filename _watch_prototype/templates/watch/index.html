<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08080E">
<title>RaddFlix</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080E;--s1:#0E0E1C;--s2:#151528;--s3:#1C1C35;
  --border:rgba(255,255,255,.07);
  --red:#E8002D;--red2:#FF1744;--red-dim:rgba(232,0,45,.14);--red-glow:rgba(232,0,45,.38);
  --text:#F2F2FF;--muted:#6A6A90;--dim:#33334A;
  --gold:#FFD60A;--green:#00E676;
  --nav-h:68px;--safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;min-height:100svh;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + var(--safe-b) + 12px);
}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
img{display:block}::-webkit-scrollbar{display:none}

/* ── Top Bar ─────────────────────────────────────────────── */
#top-bar{
  position:fixed;top:0;left:0;right:0;z-index:40;
  display:flex;align-items:center;
  padding:env(safe-area-inset-top,0) 16px 0;
  height:calc(env(safe-area-inset-top,0px) + 52px);
  background:rgba(8,8,14,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.wordmark{
  font-size:1.35rem;font-weight:900;letter-spacing:-.4px;
  user-select:none;
}
.wm-jazz{color:var(--text)}
.wm-max{
  background:linear-gradient(135deg,var(--red),#FF6B35);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.wm-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--red);margin-left:3px;margin-bottom:2px;
  vertical-align:middle;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.top-spacer{flex:1}
.top-icons{display:flex;gap:6px}
.ico-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);
  color:var(--muted);display:flex;align-items:center;justify-content:center;
  transition:.18s;
}
.ico-btn:hover{background:var(--s3);color:var(--text)}
.ico-btn svg{width:16px;height:16px;stroke-width:2}

/* ── Page wrapper ────────────────────────────────────────── */
#page{padding-top:calc(env(safe-area-inset-top,0px) + 52px + 12px)}

/* ── Section heading ─────────────────────────────────────── */
.sh{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;margin-bottom:12px;
}
.sh-title{font-size:.92rem;font-weight:800;letter-spacing:-.1px}
.sh-more{font-size:.75rem;font-weight:600;color:var(--red)}

/* ── Featured Showcase Swiper ────────────────────────────── */
#showcase{margin-bottom:24px;overflow:visible!important}
#showcase .swiper-slide{width:78vw;max-width:320px}
.fc{
  position:relative;border-radius:16px;overflow:hidden;
  aspect-ratio:2/3;background:var(--s2);
  cursor:pointer;
  transition:transform .2s;
}
.fc:active{transform:scale(.97)}
.fc-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  transition:transform .4s ease;
}
#showcase .swiper-slide-active .fc-bg{transform:scale(1.02)}
.fc-grad{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(8,8,14,.96) 0%,rgba(8,8,14,.3) 45%,rgba(8,8,14,.05) 100%);
}
.fc-body{
  position:absolute;bottom:0;left:0;right:0;padding:14px 14px 16px;
}
.fc-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--red);color:#fff;
  font-size:.6rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:3px 9px;border-radius:4px;margin-bottom:9px;
}
.fc-title{
  font-size:1.05rem;font-weight:800;line-height:1.2;
  margin-bottom:7px;letter-spacing:-.2px;
}
.fc-meta{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  font-size:.68rem;color:var(--muted);margin-bottom:12px;
}
.fc-rating{color:var(--gold);font-weight:700}
.fc-dot{width:2.5px;height:2.5px;border-radius:50%;background:var(--dim)}
.fc-genre{
  background:rgba(255,255,255,.1);padding:2px 8px;border-radius:10px;
  color:rgba(255,255,255,.7);font-size:.62rem;font-weight:600;
}
.fc-btns{display:flex;gap:8px}
.fc-play{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--red);color:#fff;border-radius:10px;padding:10px;
  font-size:.82rem;font-weight:700;
  box-shadow:0 4px 18px var(--red-glow);transition:.18s;
}
.fc-play:hover{background:var(--red2)}
.fc-info{
  width:42px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  color:var(--text);font-size:1.1rem;transition:.18s;
}
.fc-info:hover{background:rgba(255,255,255,.2)}
.fc-free-banner{
  position:absolute;top:12px;right:12px;
  background:var(--green);color:#000;
  font-size:.58rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
}

/* Swiper custom pagination */
.swiper-pagination-bullet{
  width:5px;height:5px;background:rgba(255,255,255,.3);opacity:1;border-radius:3px;
}
.swiper-pagination-bullet-active{width:18px;background:var(--red)}

/* ── Filter chips ────────────────────────────────────────── */
#filter-bar{
  display:flex;gap:8px;padding:0 16px;margin-bottom:22px;overflow-x:auto;
}
.fchip{
  flex-shrink:0;padding:8px 18px;border-radius:10px;
  font-size:.8rem;font-weight:600;
  background:var(--s2);color:var(--muted);border:1px solid var(--border);
  transition:.18s;
}
.fchip.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ── Row Swiper ──────────────────────────────────────────── */
.row-swiper{overflow:visible!important;padding:0 16px!important}
.row-swiper .swiper-slide{width:110px}

/* ── Card ────────────────────────────────────────────────── */
.card{
  border-radius:12px;overflow:hidden;position:relative;
  cursor:pointer;background:var(--s2);
  transition:transform .2s;
}
.card:active{transform:scale(.95)}
.card-img{width:110px;height:162px;object-fit:cover;display:block}
.card-ph{
  width:110px;height:162px;
  background:linear-gradient(135deg,var(--s2),var(--s3));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:var(--dim);
}
.card-overlay{
  position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(0deg,rgba(8,8,14,.97),transparent);
}
.card-foot{position:absolute;bottom:0;left:0;right:0;padding:7px 7px 8px;z-index:1}
.card-name{font-size:.65rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.card-year{font-size:.58rem;color:var(--muted);margin-top:1px}
.card-free{
  position:absolute;top:6px;left:6px;
  background:var(--green);color:#000;
  font-size:.52rem;font-weight:800;letter-spacing:.7px;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;z-index:2;
}
.card-hd{
  position:absolute;top:6px;right:6px;
  background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:rgba(255,255,255,.8);
  font-size:.52rem;font-weight:800;letter-spacing:.5px;
  padding:2px 6px;border-radius:4px;z-index:2;
}

/* ── Skeleton ────────────────────────────────────────────── */
@keyframes sk{0%,100%{opacity:.25}50%{opacity:.65}}
.skel{animation:sk 1.3s ease infinite;background:var(--s2)}
.sk-fc{border-radius:16px;aspect-ratio:2/3;width:100%}
.sk-card{width:110px;height:162px;border-radius:12px}

/* ── Bottom Sheet ────────────────────────────────────────── */
#overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);
  pointer-events:none;transition:.3s;
}
#overlay.open{background:rgba(0,0,0,.72);backdrop-filter:blur(8px);pointer-events:all}
#sheet{
  position:absolute;bottom:0;left:0;right:0;
  max-height:90svh;background:var(--s1);
  border-radius:20px 20px 0 0;border-top:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.32,1.18,.4,1);
  overflow:hidden;
}
#overlay.open #sheet{transform:translateY(0)}
.handle-bar{width:38px;height:4px;border-radius:2px;background:var(--s3);margin:12px auto 0;flex-shrink:0}
.sheet-scroll{flex:1;overflow-y:auto;padding:16px 16px 40px;scrollbar-width:none}

/* Sheet hero area */
.s-hero{
  position:relative;height:160px;border-radius:14px;overflow:hidden;margin-bottom:16px;
  background:var(--s2);
}
.s-hero-blur{
  position:absolute;inset:0;background-size:cover;background-position:center 20%;
  filter:blur(16px) brightness(.3) saturate(.5);transform:scale(1.1);
}
.s-hero-fade{position:absolute;inset:0;background:linear-gradient(0deg,var(--s1),transparent 60%)}
.s-poster{
  position:absolute;bottom:12px;left:14px;
  width:70px;height:105px;border-radius:10px;object-fit:cover;
  border:2px solid rgba(255,255,255,.1);box-shadow:0 8px 20px rgba(0,0,0,.5);
}
.s-poster-ph{
  position:absolute;bottom:12px;left:14px;
  width:70px;height:105px;border-radius:10px;
  background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:1.5rem;
}
.s-info{position:absolute;bottom:12px;left:96px;right:12px}
.s-title{font-size:1rem;font-weight:800;line-height:1.2;margin-bottom:6px}
.s-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.7rem;color:var(--muted)}
.s-star{color:var(--gold);font-weight:700}
.s-pill{
  font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:8px;
  background:var(--s3);color:var(--muted);
}
.s-pill.free{background:rgba(0,230,118,.12);color:var(--green)}

/* Sheet content */
.s-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.s-genre{
  font-size:.66rem;font-weight:600;padding:4px 12px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);color:var(--muted);
}
.s-plot{font-size:.8rem;color:var(--muted);line-height:1.65;margin-bottom:18px}
.s-actions{display:flex;gap:10px;margin-bottom:22px}
.s-btn-play{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--red);color:#fff;padding:13px;border-radius:12px;
  font-size:.9rem;font-weight:700;
  box-shadow:0 4px 18px var(--red-glow);transition:.18s;
}
.s-btn-play:hover{background:var(--red2)}
.s-btn-dl{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--s2);color:var(--text);padding:13px;border-radius:12px;
  font-size:.9rem;font-weight:600;border:1.5px solid var(--border);transition:.18s;
}
.s-btn-dl:hover{border-color:var(--red);background:var(--red-dim)}
.s-ep-label{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px}
.s-ep-grid{display:flex;flex-wrap:wrap;gap:8px}
.ep{
  padding:8px 14px;border-radius:10px;
  background:var(--s2);border:1.5px solid var(--border);
  color:var(--muted);font-size:.76rem;font-weight:600;transition:.18s;
}
.ep.sel{background:var(--red);border-color:var(--red);color:#fff}
.ep:hover:not(.sel){border-color:var(--red);color:var(--text)}

/* ── Player ──────────────────────────────────────────────── */
#player{display:none;position:fixed;inset:0;z-index:80;background:#000;flex-direction:column}
#player.on{display:flex}
#player-bar{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:rgba(0,0,0,.85);flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.p-back{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);color:var(--text);
  padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:600;transition:.15s;
}
.p-back:hover{background:var(--s3)}
#p-title{flex:1;font-size:.88rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#p-status{font-size:.68rem;color:var(--muted);flex-shrink:0}
#vid-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000}
#vid{width:100%;max-height:calc(100svh - 110px)}
#ep-strip{
  display:none;padding:8px 12px;background:rgba(0,0,0,.88);
  border-top:1px solid rgba(255,255,255,.06);overflow-x:auto;white-space:nowrap;flex-shrink:0;
}
.ep-s{
  display:inline-flex;margin-right:6px;padding:6px 14px;
  background:var(--s2);color:var(--muted);
  border:1.5px solid var(--border);border-radius:8px;
  font-size:.75rem;font-weight:600;transition:.15s;
}
.ep-s.sel{background:var(--red);border-color:var(--red);color:#fff}

/* ── Loading ─────────────────────────────────────────────── */
#loading{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(8,8,14,.82);backdrop-filter:blur(14px);
  align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
#loading.on{display:flex}
.spin{
  width:32px;height:32px;border-radius:50%;
  border:3px solid var(--s3);border-top-color:var(--red);
  animation:rot .72s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}
.load-t{font-size:.78rem;color:var(--muted);font-weight:500}

/* ── Toast ───────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-size:.8rem;font-weight:500;
  padding:10px 20px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:200;opacity:0;transition:.28s;white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Screens ─────────────────────────────────────────────── */
.scr{display:none}
.scr.on{display:block}
#scr-home{display:block}
.scr-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:50svh;gap:10px;color:var(--muted);font-size:.86rem;font-weight:500;
  padding-top:80px;text-align:center;
}
.scr-icon{font-size:2.4rem;margin-bottom:4px}

/* Search input */
#search-input{
  width:100%;padding:12px 16px 12px 44px;
  background:var(--s2);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-size:.88rem;font-family:inherit;outline:none;
  transition:border-color .18s;
}
#search-input:focus{border-color:var(--red)}

/* ── Bottom Nav ──────────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(8,8,14,.9);backdrop-filter:blur(28px) saturate(180%);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
}
.n-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:var(--muted);transition:.18s;padding:6px 0;
  position:relative;
}
.n-tab.on{color:var(--red)}
.n-tab svg{width:22px;height:22px;stroke-width:1.8}
.n-label{font-size:.6rem;font-weight:600;letter-spacing:.2px}
.n-tab.on::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:28px;height:2.5px;background:var(--red);border-radius:0 0 4px 4px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media(min-width:480px){
  #showcase .swiper-slide{width:65vw;max-width:280px}
  .row-swiper .swiper-slide{width:130px}
  .card-img,.card-ph,.sk-card{width:130px;height:192px}
}
@media(min-width:768px){
  #showcase .swiper-slide{width:50vw;max-width:260px}
  .row-swiper .swiper-slide{width:150px}
  .card-img,.card-ph,.sk-card{width:150px;height:222px}
}
</style>
</head>
<body>

<!-- ── Top Bar ─────────────────────────────────────────── -->
<div id="top-bar">
  <div class="wordmark"><span class="wm-jazz">Jazz</span><span class="wm-max">MAX</span><span class="wm-dot"></span></div>
  <div class="top-spacer"></div>
  <div class="top-icons">
    <button class="ico-btn" onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="ico-btn" onclick="showToast('Account coming soon')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </div>
</div>

<!-- ════ HOME ════ -->
<div id="scr-home" class="scr on">
<div id="page">

  <!-- Featured Showcase -->
  <div class="sh"><span class="sh-title">Featured</span></div>
  <div class="swiper" id="showcase" style="padding:0 16px 16px!important">
    <div class="swiper-wrapper" id="showcase-wrap">
      <div class="swiper-slide"><div class="skel sk-fc"></div></div>
      <div class="swiper-slide"><div class="skel sk-fc"></div></div>
      <div class="swiper-slide"><div class="skel sk-fc"></div></div>
    </div>
    <div class="swiper-pagination" id="sc-pg" style="bottom:4px"></div>
  </div>

  <!-- Filters -->
  <div id="filter-bar">
    <button class="fchip on" onclick="setFilter('all',this)">All</button>
    <button class="fchip" onclick="setFilter('movie',this)">Movies</button>
    <button class="fchip" onclick="setFilter('show',this)">Shows</button>
    <button class="fchip" onclick="setFilter('free',this)">Free</button>
  </div>

  <!-- Movies -->
  <section id="sec-movies" style="margin-bottom:28px">
    <div class="sh"><span class="sh-title">Movies</span><button class="sh-more">See all</button></div>
    <div class="swiper row-swiper" id="movies-sw">
      <div class="swiper-wrapper" id="movies-wrap">
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
      </div>
    </div>
  </section>

  <!-- Shows -->
  <section id="sec-shows" style="margin-bottom:28px">
    <div class="sh"><span class="sh-title">TV Shows</span><button class="sh-more">See all</button></div>
    <div class="swiper row-swiper" id="shows-sw">
      <div class="swiper-wrapper" id="shows-wrap">
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
        <div class="swiper-slide"><div class="skel sk-card"></div></div>
      </div>
    </div>
  </section>

</div>
</div>

<!-- ════ SEARCH ════ -->
<div id="scr-search" class="scr">
  <div style="padding:80px 16px 16px">
    <div style="position:relative;margin-bottom:20px">
      <input id="search-input" type="text" placeholder="Search movies and shows…" oninput="doSearch(this.value)">
      <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--muted);pointer-events:none" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="search-results"><div style="color:var(--muted);font-size:.82rem;padding:4px 0">Type to search…</div></div>
  </div>
</div>

<!-- ════ DOWNLOADS ════ -->
<div id="scr-downloads" class="scr">
  <div class="scr-empty">
    <div class="scr-icon">⬇️</div>
    <div style="font-weight:800;font-size:.95rem;color:var(--text)">Downloads</div>
    <div style="max-width:220px;line-height:1.5">Save movies &amp; shows to watch offline</div>
    <div style="font-size:.72rem;color:var(--dim);margin-top:4px">Coming in mobile app</div>
  </div>
</div>

<!-- ════ PROFILE ════ -->
<div id="scr-profile" class="scr">
  <div class="scr-empty">
    <div class="scr-icon">👤</div>
    <div style="font-weight:800;font-size:.95rem;color:var(--text)">My Account</div>
    <div style="max-width:220px;line-height:1.5">Sign in to access your subscription and download history</div>
    <button onclick="showToast('Login coming soon')"
      style="margin-top:12px;background:var(--red);color:#fff;padding:11px 32px;border-radius:10px;font-weight:700;font-size:.88rem">
      Sign In
    </button>
  </div>
</div>

<!-- ── Sheet ──────────────────────────────────────────────── -->
<div id="overlay" onclick="maybeCloseSheet(event)">
  <div id="sheet">
    <div class="handle-bar"></div>
    <div class="sheet-scroll" id="sheet-body"></div>
  </div>
</div>

<!-- ── Player ─────────────────────────────────────────────── -->
<div id="player">
  <div id="player-bar">
    <button class="p-back" onclick="closePlayer()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>Back
    </button>
    <span id="p-title"></span><span id="p-status"></span>
  </div>
  <div id="vid-wrap"><video id="vid" controls autoplay playsinline></video></div>
  <div id="ep-strip"></div>
</div>

<!-- ── Loading / Toast ────────────────────────────────────── -->
<div id="loading"><div class="spin"></div><div class="load-t">Getting stream…</div></div>
<div id="toast"></div>

<!-- ── Bottom Nav ─────────────────────────────────────────── -->
<nav id="bottom-nav">
  <button class="n-tab on" id="nt-home" onclick="switchTab('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="n-label">Home</span>
  </button>
  <button class="n-tab" id="nt-search" onclick="switchTab('search')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="n-label">Search</span>
  </button>
  <button class="n-tab" id="nt-downloads" onclick="switchTab('downloads')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span class="n-label">Downloads</span>
  </button>
  <button class="n-tab" id="nt-profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="n-label">My</span>
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const BASE = window.location.pathname.replace(/\/+$/,'').replace('/watch','') + '/watch';
const $ = id => document.getElementById(id);

let movies=[], shows=[], curEps=[], curEpIdx=0, curShowTitle='', curItem=null;

/* ── Swipers ─────────────────────────────────────────────── */
const scSw = new Swiper('#showcase',{
  slidesPerView:'auto', centeredSlides:true, spaceBetween:12,
  loop:false, speed:500,
  autoplay:{delay:4500,disableOnInteraction:false,pauseOnMouseEnter:true},
  pagination:{el:'#sc-pg',clickable:true},
});
const mvSw = new Swiper('#movies-sw',{slidesPerView:'auto',spaceBetween:10,freeMode:true,grabCursor:true});
const shSw = new Swiper('#shows-sw',{slidesPerView:'auto',spaceBetween:10,freeMode:true,grabCursor:true});

/* ── Load ────────────────────────────────────────────────── */
async function load(){
  try{
    const d = await fetch(BASE+'/api/catalog').then(r=>r.json());
    movies = d.movies||[]; shows = d.shows||[];
    buildShowcase(); renderMovies(movies); renderShows(shows);
    prefetch();
  }catch(e){showToast('Load error: '+e.message)}
}

/* ── Showcase ────────────────────────────────────────────── */
function buildShowcase(){
  const featured = [...movies,...shows].slice(0,8);
  if(!featured.length) return;
  scSw.removeAllSlides();
  featured.forEach(item=>{
    const bg     = item.backdrop||item.poster||'';
    const rating = item.rating ? `<span class="fc-rating">⭐ ${item.rating.toFixed(1)}</span><span class="fc-dot"></span>` : '';
    const year   = item.year   ? `<span>${esc(item.year)}</span>` : '';
    const genre  = (item.genres||[]).length ? `<span class="fc-genre">${esc(item.genres[0])}</span>` : '';
    const badge  = item.type==='show' ? 'TV Show' : 'Movie';
    const free   = item.is_free ? '<span class="fc-free-banner">FREE</span>' : '';

    scSw.appendSlide(`<div class="swiper-slide">
      <div class="fc" onclick='openSheet(${J(item)})'>
        ${bg ? `<div class="fc-bg" style="background-image:url(${bg})"></div>` : ''}
        <div class="fc-grad"></div>
        ${free}
        <div class="fc-body">
          <div class="fc-badge">🎬 ${badge}</div>
          <div class="fc-title">${esc(item.title)}</div>
          <div class="fc-meta">${rating}${year}${genre}</div>
          <div class="fc-btns">
            <button class="fc-play" onclick='event.stopPropagation();openSheet(${J(item)})'>
              ▶&nbsp;Watch
            </button>
            <button class="fc-info" onclick='event.stopPropagation();openSheet(${J(item)})' title="More info">ⓘ</button>
          </div>
        </div>
      </div>
    </div>`);
  });
  scSw.update();
  if(featured.length>1) scSw.autoplay.start();
  gsap.from('.fc',{opacity:0,y:20,duration:.5,stagger:.08,ease:'power2.out'});
}

/* ── Filter ──────────────────────────────────────────────── */
function setFilter(f,btn){
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  let mv=movies, sh=shows;
  if(f==='movie') sh=[];
  if(f==='show')  mv=[];
  if(f==='free'){mv=mv.filter(m=>m.is_free);sh=sh.filter(s=>s.is_free);}
  renderMovies(mv); renderShows(sh);
  $('sec-movies').style.display=mv.length?'':'none';
  $('sec-shows').style.display =sh.length?'':'none';
}

/* ── Render rows ─────────────────────────────────────────── */
function renderMovies(mv){
  const w=$('movies-wrap'); w.innerHTML='';
  if(!mv.length){w.innerHTML='<div style="padding:8px;color:var(--muted);font-size:.8rem">Nothing here</div>';mvSw.update();return;}
  mv.forEach(m=>{const s=document.createElement('div');s.className='swiper-slide';s.appendChild(makeCard(m));w.appendChild(s);});
  mvSw.update();
  gsap.from('#movies-wrap .swiper-slide',{opacity:0,x:16,duration:.35,stagger:.05,ease:'power2.out'});
}
function renderShows(sh){
  const w=$('shows-wrap'); w.innerHTML='';
  if(!sh.length){w.innerHTML='<div style="padding:8px;color:var(--muted);font-size:.8rem">Nothing here</div>';shSw.update();return;}
  sh.forEach(s=>{const sl=document.createElement('div');sl.className='swiper-slide';sl.appendChild(makeCard(s));w.appendChild(sl);});
  shSw.update();
  gsap.from('#shows-wrap .swiper-slide',{opacity:0,x:16,duration:.35,stagger:.05,ease:'power2.out'});
}

/* ── Card ────────────────────────────────────────────────── */
function makeCard(item){
  const el=document.createElement('div');
  el.className='card';el.onclick=()=>openSheet(item);
  const img=item.poster
    ?`<img class="card-img" src="${esc(item.poster)}" loading="lazy" onerror="this.outerHTML='<div class=card-ph>🎬</div>'">`
    :'<div class="card-ph">🎬</div>';
  const sub=item.type==='show'?`${item.episode_count||'?'} eps`:(item.year||'');
  el.innerHTML=`
    ${item.is_free?'<span class="card-free">FREE</span>':''}
    <span class="card-hd">HD</span>
    ${img}
    <div class="card-overlay"></div>
    <div class="card-foot">
      <div class="card-name">${esc(item.title)}</div>
      <div class="card-year">${esc(sub)}</div>
    </div>`;
  return el;
}

/* ── Search ──────────────────────────────────────────────── */
function doSearch(q){
  const res=$('search-results');
  const term=q.trim().toLowerCase();
  if(!term){res.innerHTML='<div style="color:var(--muted);font-size:.82rem">Type to search…</div>';return;}
  const hits=[...movies,...shows].filter(i=>i.title.toLowerCase().includes(term));
  if(!hits.length){res.innerHTML='<div style="color:var(--muted);font-size:.82rem">No results found</div>';return;}
  res.innerHTML='';
  hits.forEach(item=>{
    const r=document.createElement('div');
    r.onclick=()=>openSheet(item);
    r.style.cssText='display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer';
    r.innerHTML=`
      ${item.poster?`<img src="${esc(item.poster)}" style="width:42px;height:62px;border-radius:8px;object-fit:cover;flex-shrink:0">`:`<div style="width:42px;height:62px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">🎬</div>`}
      <div>
        <div style="font-weight:700;font-size:.86rem;margin-bottom:3px">${esc(item.title)}</div>
        <div style="font-size:.7rem;color:var(--muted)">${esc(item.year||'')} · ${item.type==='show'?'TV Show':'Movie'}</div>
      </div>`;
    res.appendChild(r);
  });
}

/* ── Sheet ───────────────────────────────────────────────── */
async function openSheet(item){
  curItem=item;curEps=[];curEpIdx=0;
  const bg=item.backdrop||item.poster||'';
  const rating=item.rating?`<span class="s-star">⭐ ${item.rating.toFixed(1)}</span>`:'';
  const runtime=item.runtime?`<span>${Math.floor(item.runtime/60)}h ${item.runtime%60}m</span>`:'';
  const freePill=item.is_free?'<span class="s-pill free">FREE</span>':'';
  const genres=(item.genres||[]).slice(0,5).map(g=>`<span class="s-genre">${esc(g)}</span>`).join('');
  const poster=item.poster;
  const posterEl=poster
    ?`<img class="s-poster" src="${esc(poster)}" onerror="this.outerHTML='<div class=s-poster-ph>🎬</div>'">`
    :'<div class="s-poster-ph">🎬</div>';
  const epsHtml=item.type==='show'?`<div class="s-ep-label">Episodes</div><div class="s-ep-grid" id="ep-grid"><div class="skel" style="height:36px;border-radius:10px;width:100%"></div></div>`:'';

  $('sheet-body').innerHTML=`
    <div class="s-hero">
      ${bg?`<div class="s-hero-blur" style="background-image:url(${bg})"></div><div class="s-hero-fade"></div>`:''}
      ${posterEl}
      <div class="s-info">
        <div class="s-title">${esc(item.title)}</div>
        <div class="s-meta-row">${rating}${runtime}${freePill}</div>
      </div>
    </div>
    ${genres?`<div class="s-genres">${genres}</div>`:''}
    ${item.plot?`<div class="s-plot">${esc(item.plot)}</div>`:''}
    <div class="s-actions">
      <button class="s-btn-play" onclick="sheetWatch()">▶&nbsp;Watch</button>
      <button class="s-btn-dl" onclick="showToast('Download coming in mobile app')">⬇&nbsp;Download</button>
    </div>
    ${epsHtml}`;

  $('overlay').classList.add('open');
  document.body.style.overflow='hidden';

  if(item.type==='show'&&item.slug){
    try{
      const d=await fetch(BASE+'/api/show/'+item.slug).then(r=>r.json());
      curEps=d.episodes||[];curEpIdx=0;curShowTitle=item.title;
      renderEpGrid();
    }catch(_){}
  }
}

function renderEpGrid(){
  const g=$('ep-grid');if(!g)return;g.innerHTML='';
  curEps.forEach((ep,i)=>{
    const b=document.createElement('button');
    b.className='ep'+(i===0?' sel':'');b.textContent=ep.label;
    b.onclick=()=>{curEpIdx=i;g.querySelectorAll('.ep').forEach((x,j)=>x.classList.toggle('sel',j===i));};
    g.appendChild(b);
  });
}

function maybeCloseSheet(e){if(e.target===$('overlay'))closeSheet();}
function closeSheet(){
  $('overlay').classList.remove('open');
  document.body.style.overflow='';
}

function sheetWatch(){
  if(curItem.type==='show'){
    if(!curEps.length){showToast('Episodes loading…');return;}
    buildEpStrip();closeSheet();
    showPlayer(curShowTitle+' · '+curEps[curEpIdx].label,curEps[curEpIdx].file_id);
  }else{
    $('ep-strip').style.display='none';curEps=[];
    closeSheet();
    showPlayer(curItem.title+(curItem.year?' ('+curItem.year+')':''),curItem.file_id);
  }
}

/* ── Episode strip ───────────────────────────────────────── */
function buildEpStrip(){
  const s=$('ep-strip');s.style.display='block';s.innerHTML='';
  curEps.forEach((ep,i)=>{
    const b=document.createElement('button');
    b.className='ep-s'+(i===curEpIdx?' sel':'');b.textContent=ep.label;
    b.onclick=()=>switchEp(i);s.appendChild(b);
  });
}
function switchEp(i){
  curEpIdx=i;
  $('ep-strip').querySelectorAll('.ep-s').forEach((b,j)=>b.classList.toggle('sel',j===i));
  $('p-title').textContent=curShowTitle+' · '+curEps[i].label;
  triggerPlay(curEps[i].file_id);
}

/* ── Player ──────────────────────────────────────────────── */
function showPlayer(title,fileId){
  $('p-title').textContent=title;$('p-status').textContent='';
  $('vid').src='';$('player').classList.add('on');
  gsap.fromTo('#player',{opacity:0},{opacity:1,duration:.22});
  triggerPlay(fileId);
}
async function triggerPlay(fileId){
  setLoad(true);$('p-status').textContent='Getting stream…';
  try{
    const d=await fetch(BASE+'/api/play/'+fileId,{method:'POST'}).then(r=>r.json());
    setLoad(false);
    if(!d.ok){$('p-status').textContent='✗ '+(d.error||'failed');return;}
    $('p-status').textContent=d.cached?'● cached':'● live';
    const v=$('vid');v.src=d.url;v.play().catch(()=>{});
  }catch(e){setLoad(false);$('p-status').textContent='✗ '+e.message;}
}
function closePlayer(){
  gsap.to('#player',{opacity:0,duration:.18,onComplete:()=>{
    $('player').classList.remove('on');
    const v=$('vid');v.pause();v.src='';
    $('ep-strip').style.display='none';curEps=[];curShowTitle='';
  }});
}

/* ── Nav tabs ────────────────────────────────────────────── */
const TABS=['home','search','downloads','profile'];
function switchTab(name){
  TABS.forEach(t=>{
    $('scr-'+t).classList.toggle('on',t===name);
    $('nt-'+t).classList.toggle('on',t===name);
  });
  if(name==='search') setTimeout(()=>$('search-input').focus(),200);
}

/* ── Prefetch ────────────────────────────────────────────── */
function prefetch(){
  movies.forEach(m=>{
    if(m.has_folder_share&&m.poster&&!m.poster.startsWith('/watch/poster-img/'))
      fetch(BASE+'/api/poster/movie/'+m.title_id).catch(()=>{});
  });
}

/* ── Utils ───────────────────────────────────────────────── */
function setLoad(on){$('loading').classList.toggle('on',on)}
let _tt;
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);
}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function J(v){return JSON.stringify(v).replace(/"/g,'&quot;')}

load();
</script>
</body>
</html>
